<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manjaro Toolbox</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Manjaro / Arch</p>
        <h1>Manjaro Toolbox</h1>
      </div>
      <button id="refresh" type="button">Atualizar</button>
    </header>

    <section class="status" aria-live="polite">
      <span id="status-dot"></span>
      <span id="status-text">Pronto</span>
    </section>

    <section class="sudo-panel">
      <div>
        <h2>Instalação Selecionada</h2>
        <p>Escolha os pacotes, informe a senha sudo e instale tudo de uma vez. A senha não é salva.</p>
      </div>
      <label class="password-field">
        Senha sudo
        <span class="password-control">
          <input id="sudo-password" type="password" autocomplete="current-password" placeholder="Digite sua senha">
          <button id="toggle-password" type="button" class="secondary" aria-pressed="false">Mostrar</button>
        </span>
        <small>Use para conferir símbolos e layout do teclado. A senha não é salva.</small>
      </label>
      <div class="panel-actions">
        <button id="select-recommended" type="button" class="secondary">Selecionar recomendados</button>
        <button id="clear-selection" type="button" class="secondary">Limpar seleção</button>
        <button id="install-selected" type="button">Instalar selecionados</button>
      </div>
    </section>

    <section id="packages" class="package-grid"></section>

    <section class="section-title">
      <h2>Ações Rápidas</h2>
    </section>
    <section id="actions" class="grid"></section>

    <section class="output-panel">
      <div class="output-header">
        <h2>Saída</h2>
        <button id="clear" type="button">Limpar</button>
      </div>
      <pre id="output">Selecione uma ação para executar.</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
